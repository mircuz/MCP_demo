    .gov-tree{background:rgba(0,0,0,.25);border-radius:13px;padding:14px 16px;border:1px solid ${DB.w10}}
    .gov-t-root{font-family:monospace;font-size:0.94rem;line-height:1.9}

    /* Pipeline */
    .dp-pipeline{display:flex;align-items:center;gap:5px;padding:8px;background:rgba(0,0,0,.15);border-radius:8px;border:1px solid ${DB.w10};justify-content:center}
    .dp-stage{padding:6px 10px;border-radius:7px;text-align:center;flex:1}
    .dp-s1{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.14)}
    .dp-s2{background:rgba(255,54,33,.05);border:1px solid rgba(255,54,33,.1)}
    .dp-s3{background:rgba(100,255,218,.04);border:1px solid rgba(100,255,218,.1)}
    .dp-stage strong{display:block;font-size:0.94rem;color:#fff;font-weight:700}
    .dp-stage span{font-size:0.82rem;color:${DB.w45}}
    .dp-arrow-s{font-size:1.01rem;color:${DB.w20};flex-shrink:0}

    /* Catalog grid */
    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:980px;width:100%}
    .cat-card{padding:14px 12px 12px;border-radius:12px;background:${DB.w05};border:1px solid ${DB.w10};text-align:left;display:flex;flex-direction:column;gap:5px;position:relative;transition:all .3s cubic-bezier(.4,0,.2,1)}
    .cat-card:hover{transform:translateY(-3px);border-color:${DB.w20};background:rgba(255,255,255,.05);box-shadow:0 8px 24px rgba(0,0,0,.3)}
    .cat-phase{position:absolute;top:9px;right:9px;font-size:0.73rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:4px}
    .cat-ph1{background:rgba(255,54,33,.12);color:${DB.orangeLight};border:1px solid rgba(255,54,33,.2)}
    .cat-ph2{background:rgba(34,211,238,.08);color:#22D3EE;border:1px solid rgba(34,211,238,.18)}
    .cat-ph3{background:rgba(245,158,11,.08);color:#F59E0B;border:1px solid rgba(245,158,11,.18)}
    .cat-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:1px}
    .cat-ico-rose{background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.18)}
    .cat-ico-cyan{background:rgba(34,211,238,.06);border:1px solid rgba(34,211,238,.13)}
    .cat-ico-orange{background:rgba(255,54,33,.08);border:1px solid rgba(255,54,33,.18)}
    .cat-ico-gold{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.14)}
    .cat-ico-purple{background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.16)}
    .cat-ico-green{background:rgba(100,255,218,.05);border:1px solid rgba(100,255,218,.12)}
    .cat-card strong{font-size:1.07rem;color:#fff;font-weight:700;line-height:1.2;padding-right:46px}
    .cat-card p{font-size:0.9rem;color:${DB.w45};line-height:1.45;margin:0}

    /* ═══ RESPONSIVE ═══ */
    @media(max-width:900px){
      .sl{padding:20px 14px}
      .gap-grid,.found-grid,.scale-grid,.cat-grid,.arch-db-inner{grid-template-columns:1fr}
      .dots{display:none}
    }
    @media(max-width:600px){
      .gap-grid,.cat-grid{grid-template-columns:1fr}
    }
  `;
  document.head.appendChild(s);

  const app = document.getElementById('app');

  // Progress bar
  const pbar = document.createElement('div');
  pbar.className = 'pbar';
  app.appendChild(pbar);

  // Dot navigation
  const dots = document.createElement('div');
  dots.className = 'dots';
  slides.forEach((sl, i) => {
    const d = document.createElement('button');
    d.className = 'dot';
    d.addEventListener('click', e => { e.stopPropagation(); go(i); });
    dots.appendChild(d);
  });
  app.appendChild(dots);

  // Slide elements
  const els = slides.map((sl, i) => {
    const div = document.createElement('div');
    div.className = `sl${i === 0 ? ' on' : ''}`;
    div.style.background = sl.bg;
    div.innerHTML = `<div class="sl-in">${sl.body}</div>`;
    app.appendChild(div);
    return div;
  });

  function ui() {
    pbar.style.width = `${((cur + 1) / slides.length) * 100}%`;
    pbar.style.background = slides[cur].accent;
    pbar.style.boxShadow = `0 0 12px ${slides[cur].accent}`;
    dots.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('on', i === cur);
      d.style.setProperty('--ac', slides[cur].accent);
    });
  }
  ui();

  function go(idx) {
    if (moving || idx === cur || idx < 0 || idx >= slides.length) return;
    moving = true;
    const dir = idx > cur ? 'eu' : 'ed';
    const prev = els[cur], next = els[idx];
    prev.classList.remove('on');
    prev.classList.add(dir);
    next.querySelectorAll('.A').forEach(el => {
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    });
    next.classList.remove('eu', 'ed');
    next.classList.add('on');
    cur = idx;
    ui();
    setTimeout(() => { prev.classList.remove('eu', 'ed'); moving = false; }, 550);
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(cur + 1); }
    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); go(cur - 1); }
    if (e.key === 'Home') { e.preventDefault(); go(0); }
    if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
  });

  // Wheel
  let wt = 0;
  document.addEventListener('wheel', e => {
    const now = Date.now();
    if (now - wt < 700) return;
    wt = now;
    go(cur + (e.deltaY > 0 ? 1 : -1));
  }, { passive: true });

  // Touch
  let ty = 0;
  document.addEventListener('touchstart', e => { ty = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dy = ty - e.changedTouches[0].clientY;
    if (Math.abs(dy) > 50) go(cur + (dy > 0 ? 1 : -1));
  }, { passive: true });

  // Click
  app.addEventListener('click', e => {
    if (e.target.closest('.dots')) return;
    go(cur + 1);
  });

})();
</script>
</body>
</html>
